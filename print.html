                                        </td>
                                        <td className="py-3 text-right text-slate-500 font-mono">
                                            {item.tva}%
                                        </td>
                                        <td className="py-3 text-right font-semibold text-slate-800 font-mono">
                                            {formatEur(item.ht)}
                                        </td>
                                        <td className="py-3 text-right font-semibold text-slate-700 font-mono pr-2">
                                            {formatEur(item.ttc)}
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>

                        {/* Quote Options (Printed list at bottom of details if exists) */}
                        {data.options && data.options.length > 0 && (
                            <div className="mt-6 pt-4 border-t border-slate-200 bg-amber-50/10 p-3 rounded-lg border border-amber-200/40">
                                <h3 className="text-xs font-bold text-amber-700 uppercase tracking-wider mb-2">Options facultatives proposées (Non incluses dans les totaux)</h3>
                                <div className="grid grid-cols-2 gap-4">
                                    {data.options.map((opt, idx) => (
                                        <div key={idx} className="bg-white border border-slate-200 rounded p-2 text-xs flex justify-between items-center">
                                            <div>
                                                <span className="font-semibold text-slate-800 block">{opt.desc}</span>
                                                <span className="text-[10px] text-slate-400">TVA {opt.tva}% {opt.qty > 1 && `— P.U. ${formatEur(opt.pu)} HT`}</span>
                                            </div>
                                            <div className="text-right">
                                                <span className="font-bold text-amber-900 block font-mono">{formatEur(opt.ht)} HT</span>
                                                <span className="text-[9px] text-slate-400 font-mono">{formatEur(opt.ttc)} TTC</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Financial Blocks (Prestation, Honoraires, Cumul) */}
                    <div className="bg-slate-50 border border-slate-200 rounded-xl p-5 mt-4 grid grid-cols-3 gap-6">
                        
                        {/* 1. Prestation HT / TTC */}
                        <div className="border-r border-slate-200 pr-6">
                            <span className="text-[10px] uppercase font-bold text-slate-400 tracking-wider">1. Montant de la prestation</span>
                            <div className="mt-3 flex justify-between items-baseline">
                                <span className="text-xs text-slate-500 font-medium">Prestation HT</span>
                                <span className="text-lg font-bold text-slate-900 font-mono">{formatEur(data.prestationHT)}</span>
                            </div>
                            <div className="mt-1.5 flex justify-between items-baseline border-t border-slate-200/60 pt-1.5">
                                <span className="text-xs text-slate-500 font-medium">Prestation TTC</span>
                                <span className="text-base font-semibold text-slate-700 font-mono">{formatEur(data.prestationTTC)}</span>
                            </div>
                        </div>

                        {/* 2. Honoraires HT / TTC */}
                        <div className="border-r border-slate-200 px-6">
                            <span className="text-[10px] uppercase font-bold text-slate-400 tracking-wider">2. Montant honoraires (5%)</span>
                            <div className="mt-3 flex justify-between items-baseline">
                                <span className="text-xs text-slate-500 font-medium">Honoraires HT</span>
                                <span className="text-lg font-bold text-slate-900 font-mono">{formatEur(data.honorairesHT)}</span>
                            </div>
                            <div className="mt-1.5 flex justify-between items-baseline border-t border-slate-200/60 pt-1.5">
                                <span className="text-xs text-slate-500 font-medium">Honoraires TTC</span>
                                <span className="text-base font-semibold text-slate-700 font-mono">{formatEur(data.honorairesTTC)}</span>
                            </div>
                        </div>

                        {/* 3. Cumul des deux */}
                        <div className="pl-6 flex flex-col justify-between">
                            <div>
                                <span className="text-[10px] uppercase font-bold text-kpmg-blue tracking-wider">3. Cumul des budgets</span>
                                <div className="mt-2.5 flex justify-between items-baseline bg-kpmg-blue/5 p-2 rounded border border-kpmg-blue/10">
                                    <span className="text-xs font-bold text-kpmg-dark">CUMUL HT</span>
                                    <span className="text-xl font-extrabold text-kpmg-blue font-mono">{formatEur(data.totalHT)}</span>
                                </div>
                            </div>
                            <div className="mt-2 flex justify-between items-baseline pt-1 border-t border-slate-200/60 text-slate-500 font-medium text-xs">
                                <span>Cumul TTC</span>
                                <span className="font-bold font-mono">{formatEur(data.totalTTC)}</span>
                            </div>
                        </div>
                    </div>

                    {/* Footer Info */}
                    <div className="mt-4 pt-3 border-t border-slate-200 flex justify-between text-[10px] text-slate-400 uppercase font-bold">
                        <span>Calculs conformes aux barèmes et TVA légaux</span>
                        <span>Moyenne par participant : {formatEur(data.totalHT / data.paxCount)} HT / PAX — Réf {data.id}</span>
                    </div>
                </div>
            );
        };

        // --- MAIN APP ---
        function App() {
            return (
                <div className="flex flex-col gap-8 max-w-7xl mx-auto py-8">
                    
                    {/* PAGE 1: GLOBAL SUMMARY COMPARISON MATRIX */}
                    <div className="print-section print-zoom">
                        {/* Header */}
                        <div className="flex justify-between items-center border-b-4 border-kpmg-blue pb-4">
                            <div>
                                <h1 className="text-3xl font-extrabold text-kpmg-dark font-heading">
                                    KPMG <span className="font-light text-slate-500">— Séminaire Associés Régionaux</span>
                                </h1>
                                <p className="text-sm text-slate-500 mt-1">Comparateur Budgétaire Global de l'Appel d'Offres</p>
                            </div>
                            <div className="text-right">
                                <span className="bg-kpmg-blue text-white font-bold text-xs px-3 py-1 rounded">Rapport de Synthèse</span>
                                <p className="text-[10px] text-slate-400 mt-2 font-mono">Date: Mai 2026</p>
                            </div>
                        </div>

                        {/* Main Comparison Matrix */}
                        <div className="my-6 flex-1">
                            <h3 className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3">Synthèse comparative des lots</h3>
                            <GlobalComparisonTable />
                            
                            <h3 className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 mt-6">Simulations de configurations globales</h3>
                            <BenchmarksView />
                        </div>

                        {/* Footer */}
                        <div className="border-t border-slate-200 pt-3 flex justify-between text-[10px] text-slate-400 uppercase font-bold">
                            <span>KPMG Régional Partners Seminar 2026 — Document de Synthèse Décisionnel</span>
                            <span>Page 1 / 7</span>
                        </div>
                    </div>

                    {/* PAGES 2-7: INDIVIDUAL PROPOSAL DETAIL PAGES */}
                    <ProviderPrintCard data={budgetData.lot1_pullman} />
                    <ProviderPrintCard data={budgetData.lot1_meridien} />
                    
                    <ProviderPrintCard data={budgetData.lot2_billy_billy} />
                    <ProviderPrintCard data={budgetData.lot2_it_trattoria} />
                    
                    <ProviderPrintCard data={budgetData.lot3_duplex} />
                    <ProviderPrintCard data={budgetData.lot3_yachts} />
                    
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
