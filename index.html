<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEEVUP x KPMG — Exemple de Budget</title>
    <meta name="description" content="Simulateur et comparateur de budget pour l'événement KPMG">

    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React & ReactDOM via CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Babel Standalone for JSX in-browser transpilation -->
    <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        h1, h2, h3, h4, .font-heading {
            font-family: 'Outfit', sans-serif;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #00338D;
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        kpmg: {
                            blue: '#00338D',      // Deep Navy Blue
                            medium: '#005F9E',    // Medium Blue
                            light: '#00A3A6',     // Teal Accent
                            slate: '#F2F4F7',     // Light Background
                            dark: '#0C2340',      // Dark Slate
                        }
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-slate-50 text-gray-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- UTILS ---
        const formatEur = (value) => {
            return new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 }).format(value);
        };

        const formatPercent = (value) => {
            return new Intl.NumberFormat('fr-FR', { style: 'percent', minimumFractionDigits: 1, maximumFractionDigits: 1 }).format(value);
        };

        function App() {
            // --- STATE FOR SECTION 1: TEMPS HOMME ---
            const [tempsHomme, setTempsHomme] = useState([
                { id: 1, profil: "Marilou - Cheffe de projet senior", seniorite: "E4", tjm: 850, preprod: 8, jourj: 2 },
                { id: 2, profil: "Directeur de Projet", seniorite: "E5", tjm: 1100, preprod: 3, jourj: 2 },
                { id: 3, profil: "Chef de Projet Evénementiel", seniorite: "E3", tjm: 600, preprod: 5, jourj: 2 },
                { id: 4, profil: "Assistant événementiel Junior", seniorite: "E1", tjm: 380, preprod: 5, jourj: 2 },
                { id: 5, profil: "Directeur Technique", seniorite: "E3", tjm: 800, preprod: 2, jourj: 2 },
                { id: 6, profil: "Directeur Artistique", seniorite: "E4", tjm: 750, preprod: 3, jourj: 2 },
                { id: 7, profil: "Graphiste Senior (sceno / contenus)", seniorite: "E2", tjm: 520, preprod: 3, jourj: 2 }
            ]);

            const [majorationGala, setMajorationGala] = useState(1565);
            const [majorationTardive, setMajorationTardive] = useState(1650);

            // --- STATE FOR SECTION 2: PRESTATIONS ---
            const [prestations, setPrestations] = useState([
                { id: 1, poste: "Location lieu prestige (2 jours)", brut: 32000, savings: 4000, note: "" },
                { id: 2, poste: "Production scenique (scene, son, lumiere, video, regie)", brut: 38000, savings: 4500, note: "" },
                { id: 3, poste: "Traiteur - Diner de gala (300 couverts)", brut: 25500, savings: 2700, note: "85,00 € × 300 pers." },
                { id: 4, poste: "Traiteur - Autres repas convention (dejeuners, pauses)", brut: 27000, savings: 800, note: "45,00 € × 600 pers." },
                { id: 5, poste: "Hebergement (150 chambres twins x 1 nuit)", brut: 42000, savings: 3500, note: "280,00 € × 150 ch." },
                { id: 6, poste: "Retrocommission hebergement (-10%, reversee au client)", brut: 0, savings: 4200, isRefund: true, note: "Reversement client" },
                { id: 7, poste: "Transport (navettes & transferts)", brut: 9000, savings: 800, note: "" },
                { id: 8, poste: "Animation & artistes (gala)", brut: 14000, savings: 1000, note: "" },
                { id: 9, poste: "Impression badges", brut: 750, savings: 100, note: "" },
                { id: 10, poste: "Hôtesses & Sécurité", brut: 2200, savings: 150, note: "" },
                { id: 11, poste: "Decoration / scenographie / securite", brut: 10000, savings: 1200, note: "" },
                { id: 12, poste: "VHR equipe - Transport (location 2 vehicules + peages/essence)", brut: 2200, savings: 0, note: "" },
                { id: 13, poste: "VHR equipe - Hebergement (6 weevers x 1 nuit)", brut: 840, savings: 0, note: "140,00 € × 6 pers." },
                { id: 14, poste: "VHR equipe - Restauration (6 weevers x 2 jours)", brut: 480, savings: 0, note: "40,00 € × 12 repas" },
                { id: 15, poste: "Bilan carbone de l'evenement (a chiffrer)", brut: 0, savings: 0, note: "À chiffrer" }
            ]);

            // --- CALCULATIONS FOR TEMPS HOMME ---
            const calculatedTempsHomme = tempsHomme.map(item => {
                const totalJours = item.preprod + item.jourj;
                const totalEur = totalJours * item.tjm;
                return { ...item, totalJours, totalEur };
            });

            const totalPreprodDays = calculatedTempsHomme.reduce((sum, item) => sum + item.preprod, 0);
            const totalJourJDays = calculatedTempsHomme.reduce((sum, item) => sum + item.jourj, 0);
            const totalDays = calculatedTempsHomme.reduce((sum, item) => sum + item.totalJours, 0);
            const subtotalTempsHomme = calculatedTempsHomme.reduce((sum, item) => sum + item.totalEur, 0) + majorationGala + majorationTardive;

            // --- CALCULATIONS FOR PRESTATIONS ---
            const calculatedPrestations = prestations.map(item => {
                let net = 0;
                if (item.isRefund) {
                    net = -item.savings;
                } else {
                    net = item.brut - item.savings;
                }
                return { ...item, net };
            });

            const totalBrutPrestations = calculatedPrestations.reduce((sum, item) => sum + (item.isRefund ? 0 : item.brut), 0);
            const totalSavingsPrestations = calculatedPrestations.reduce((sum, item) => sum + item.savings, 0);
            const subtotalPrestationsNet = calculatedPrestations.reduce((sum, item) => sum + item.net, 0);

            // --- SYNTHESE DE REMUNERATION ---
            const basePrestationsRefacturees = subtotalPrestationsNet + subtotalTempsHomme;
            const honorairesAgence = Math.round(basePrestationsRefacturees * 0.06);
            const assurance = Math.round(basePrestationsRefacturees * 0.008);
            const fraisPortage = Math.round(basePrestationsRefacturees * 0.04);
            const totalHT = basePrestationsRefacturees + honorairesAgence + assurance + fraisPortage;
            const tva = Math.round(totalHT * 0.20);
            const totalTTC = totalHT + tva;

            // --- ECHEANCIER ---
            const acompte = Math.round(totalTTC * 0.30);
            const solde = totalTTC - acompte;

            // --- HANDLERS FOR INTERACTIVE FIELDS ---
            const handleTempsHommeChange = (id, field, value) => {
                const numVal = parseFloat(value) || 0;
                setTempsHomme(prev => prev.map(item => item.id === id ? { ...item, [field]: numVal } : item));
            };

            const handlePrestationChange = (id, field, value) => {
                const numVal = parseFloat(value) || 0;
                setPrestations(prev => prev.map(item => item.id === id ? { ...item, [field]: numVal } : item));
            };

            return (
                <div className="min-h-screen bg-slate-50 pb-16">
                    {/* Header */}
                    <header className="bg-kpmg-dark text-white border-b-4 border-kpmg-light shadow-md sticky top-0 z-40">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-5">
                            <div className="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-4">
                                <div>
                                    <div className="flex items-center gap-3">
                                        <span className="bg-kpmg-blue font-bold px-3 py-1 text-xs tracking-wider uppercase rounded border border-white/20">WEEVUP x KPMG</span>
                                        <span className="bg-kpmg-light/20 text-kpmg-light font-semibold px-2.5 py-0.5 text-xs rounded-full border border-kpmg-light/30">Exemple de budget (Lot 2)</span>
                                    </div>
                                    <h1 className="text-2xl lg:text-3xl font-extrabold tracking-tight mt-2 font-heading">
                                        Cas 3 : Convention annuelle + soirée de gala
                                    </h1>
                                    <p className="text-xs lg:text-sm text-slate-300 mt-1">
                                        300 participants — Lieu prestige | Mode : Clé en main (Gants Blancs) | Marge prestations : 0% | Phase amont : 0%
                                    </p>
                                </div>
                                <div className="text-right bg-white/5 px-4 py-2 rounded-xl border border-white/10">
                                    <span className="text-[10px] text-slate-400 block uppercase font-bold tracking-wider">Budget Global</span>
                                    <span className="text-2xl lg:text-3xl font-extrabold text-white block font-heading">{formatEur(totalTTC)} <span className="text-xs font-normal text-slate-300">TTC</span></span>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 space-y-10">

                        {/* RÉSUMÉ DE L'OFFRE (TOP SECTION) */}
                        <section className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 lg:p-8 space-y-8 animate-fade-in">
                            <div className="border-b border-slate-100 pb-4">
                                <h2 className="text-xl lg:text-2xl font-bold text-kpmg-dark font-heading">Résumé Financier de l'Offre</h2>
                                <p className="text-xs lg:text-sm text-slate-500 mt-1">Récapitulatif des indicateurs clés et répartition analytique du budget.</p>
                            </div>

                            {/* Indicators Grid */}
                            <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
                                <div className="bg-gradient-to-br from-kpmg-dark to-kpmg-blue text-white p-5 rounded-2xl shadow-sm flex flex-col justify-between">
                                    <span className="text-xs uppercase font-bold text-slate-300 tracking-wider">Total Budget TTC</span>
                                    <span className="text-2xl lg:text-3xl font-black mt-2 font-heading">{formatEur(totalTTC)}</span>
                                    <span className="text-[10px] text-slate-300 mt-2 block">TVA 20% incluse ({formatEur(tva)})</span>
                                </div>

                                <div className="bg-slate-50 border border-slate-200 p-5 rounded-2xl flex flex-col justify-between">
                                    <span className="text-xs uppercase font-bold text-slate-500 tracking-wider">Total HT</span>
                                    <span className="text-2xl lg:text-3xl font-black text-kpmg-dark mt-2 font-heading">{formatEur(totalHT)}</span>
                                    <span className="text-[10px] text-slate-400 mt-2 block">Base de facturation</span>
                                </div>

                                <div className="bg-emerald-50 border border-emerald-200 p-5 rounded-2xl flex flex-col justify-between">
                                    <span className="text-xs uppercase font-bold text-emerald-700 tracking-wider">Savings négociés</span>
                                    <span className="text-2xl lg:text-3xl font-black text-emerald-800 mt-2 font-heading">{formatEur(totalSavingsPrestations)}</span>
                                    <span className="text-[10px] text-emerald-600 mt-2 block">Remises reversées à 100%</span>
                                </div>

                                <div className="bg-sky-50 border border-sky-200 p-5 rounded-2xl flex flex-col justify-between">
                                    <span className="text-xs uppercase font-bold text-sky-700 tracking-wider">Coût par participant</span>
                                    <span className="text-2xl lg:text-3xl font-black text-sky-800 mt-2 font-heading">{formatEur(totalHT / 300)} <span className="text-xs font-normal">HT</span></span>
                                    <span className="text-[10px] text-sky-600 mt-2 block">Base 300 participants</span>
                                </div>
                            </div>

                            {/* Unified Bar / Gauges per Section */}
                            <div className="space-y-6 pt-4">
                                <h3 className="text-sm font-bold text-slate-700 uppercase tracking-wider">Répartition du Budget HT</h3>
                                
                                {/* Stacked Progress Bar */}
                                <div className="w-full h-5 rounded-full overflow-hidden bg-slate-100 flex shadow-inner">
                                    <div 
                                        className="bg-kpmg-blue transition-all duration-500" 
                                        style={{ width: `${(subtotalTempsHomme / totalHT) * 100}%` }}
                                        title={`Temps Homme: ${formatPercent(subtotalTempsHomme / totalHT)}`}
                                    ></div>
                                    <div 
                                        className="bg-kpmg-light transition-all duration-500" 
                                        style={{ width: `${(subtotalPrestationsNet / totalHT) * 100}%` }}
                                        title={`Prestations: ${formatPercent(subtotalPrestationsNet / totalHT)}`}
                                    ></div>
                                    <div 
                                        className="bg-amber-500 transition-all duration-500" 
                                        style={{ width: `${((honorairesAgence + assurance + fraisPortage) / totalHT) * 100}%` }}
                                        title={`Honoraires & Frais: ${formatPercent((honorairesAgence + assurance + fraisPortage) / totalHT)}`}
                                    ></div>
                                </div>

                                {/* Gauges details */}
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                    <div className="bg-white border border-slate-100 p-4 rounded-xl shadow-xs space-y-2">
                                        <div className="flex justify-between text-xs font-semibold">
                                            <span className="text-slate-600 flex items-center gap-2">
                                                <span className="w-3 h-3 rounded-full bg-kpmg-blue"></span>
                                                1. Temps Homme (Agence)
                                            </span>
                                            <span className="text-slate-900 font-bold">{formatEur(subtotalTempsHomme)} ({formatPercent(subtotalTempsHomme / totalHT)})</span>
                                        </div>
                                        <div className="w-full bg-slate-100 rounded-full h-2">
                                            <div className="bg-kpmg-blue h-2 rounded-full transition-all duration-500" style={{ width: `${(subtotalTempsHomme / totalHT) * 100}%` }}></div>
                                        </div>
                                    </div>

                                    <div className="bg-white border border-slate-100 p-4 rounded-xl shadow-xs space-y-2">
                                        <div className="flex justify-between text-xs font-semibold">
                                            <span className="text-slate-600 flex items-center gap-2">
                                                <span className="w-3 h-3 rounded-full bg-kpmg-light"></span>
                                                2. Prestations Événement (Net)
                                            </span>
                                            <span className="text-slate-900 font-bold">{formatEur(subtotalPrestationsNet)} ({formatPercent(subtotalPrestationsNet / totalHT)})</span>
                                        </div>
                                        <div className="w-full bg-slate-100 rounded-full h-2">
                                            <div className="bg-kpmg-light h-2 rounded-full transition-all duration-500" style={{ width: `${(subtotalPrestationsNet / totalHT) * 100}%` }}></div>
                                        </div>
                                    </div>

                                    <div className="bg-white border border-slate-100 p-4 rounded-xl shadow-xs space-y-2">
                                        <div className="flex justify-between text-xs font-semibold">
                                            <span className="text-slate-600 flex items-center gap-2">
                                                <span className="w-3 h-3 rounded-full bg-amber-500"></span>
                                                3. Honoraires, Portage & Assurances
                                            </span>
                                            <span className="text-slate-900 font-bold">{formatEur(honorairesAgence + assurance + fraisPortage)} ({formatPercent((honorairesAgence + assurance + fraisPortage) / totalHT)})</span>
                                        </div>
                                        <div className="w-full bg-slate-100 rounded-full h-2">
                                            <div className="bg-amber-500 h-2 rounded-full transition-all duration-500" style={{ width: `${((honorairesAgence + assurance + fraisPortage) / totalHT) * 100}%` }}></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </section>


                        {/* BUDGET DETAILS SECTION */}
                        <section className="space-y-8 animate-fade-in">
                            <div className="flex items-center gap-2 border-b border-slate-200 pb-3">
                                <span className="w-2.5 h-6 rounded-full bg-kpmg-blue"></span>
                                <h2 className="text-2xl font-bold text-kpmg-dark font-heading">Détails de l'Offre Financière</h2>
                            </div>

                            {/* Legend warning for user interaction */}
                            <div className="bg-blue-50 border border-blue-200 text-blue-800 p-4 rounded-xl flex items-start gap-3 text-xs md:text-sm">
                                <svg xmlns="http://www.w3.org/2000/svg" className="w-5 h-5 text-blue-600 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                                </svg>
                                <div>
                                    <span className="font-bold">Mode Interactif Activé :</span> Les cellules en <span className="bg-blue-100 border border-blue-300 text-blue-900 px-1 py-0.5 rounded font-bold">bleu clair</span> sont modifiables en direct. Les cellules en <span className="bg-slate-100 border border-slate-300 text-slate-900 px-1 py-0.5 rounded font-bold">gris</span> correspondent aux calculs automatiques.
                                </div>
                            </div>

                            {/* 1. TEMPS HOMME TABLE */}
                            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                <div className="bg-kpmg-slate px-6 py-4 border-b border-slate-200 flex justify-between items-center">
                                    <h3 className="font-bold text-kpmg-dark font-heading flex items-center gap-2">
                                        <span className="bg-kpmg-blue text-white text-[10px] uppercase font-bold px-2 py-0.5 rounded">1</span>
                                        1. TEMPS HOMME (équipe agence)
                                    </h3>
                                    <span className="text-xs text-slate-500 font-mono">Sous-total : {formatEur(subtotalTempsHomme)}</span>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-xs text-left border-collapse">
                                        <thead>
                                            <tr className="bg-slate-50 text-slate-500 border-b border-slate-200">
                                                <th className="py-3 px-4 font-semibold">Profil</th>
                                                <th className="py-3 px-4 font-semibold text-center">Seniorité</th>
                                                <th className="py-3 px-4 font-semibold text-right w-32">TJM (EUR)</th>
                                                <th className="py-3 px-4 font-semibold text-right w-24">Jours preprod</th>
                                                <th className="py-3 px-4 font-semibold text-right w-24">Jours Jour J</th>
                                                <th className="py-3 px-4 font-semibold text-right w-24">Total jours</th>
                                                <th className="py-3 px-4 font-semibold text-right w-36">Total EUR</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {calculatedTempsHomme.map((item) => (
                                                <tr key={item.id} className="hover:bg-slate-50/50">
                                                    <td className="py-3.5 px-4 font-medium text-slate-800">{item.profil}</td>
                                                    <td className="py-3.5 px-4 text-center font-semibold text-slate-500">{item.seniorite}</td>
                                                    <td className="py-2 px-2 text-right">
                                                        <input 
                                                            type="number" 
                                                            value={item.tjm} 
                                                            onChange={(e) => handleTempsHommeChange(item.id, 'tjm', e.target.value)}
                                                            className="w-full text-right px-2 py-1.5 border border-blue-200 bg-blue-50/30 rounded focus:ring-1 focus:ring-kpmg-blue focus:bg-white font-semibold text-slate-700 outline-none"
                                                        />
                                                    </td>
                                                    <td className="py-2 px-2 text-right">
                                                        <input 
                                                            type="number" 
                                                            value={item.preprod} 
                                                            onChange={(e) => handleTempsHommeChange(item.id, 'preprod', e.target.value)}
                                                            className="w-full text-right px-2 py-1.5 border border-blue-200 bg-blue-50/30 rounded focus:ring-1 focus:ring-kpmg-blue focus:bg-white font-semibold text-slate-700 outline-none"
                                                        />
                                                    </td>
                                                    <td className="py-2 px-2 text-right">
                                                        <input 
                                                            type="number" 
                                                            value={item.jourj} 
                                                            onChange={(e) => handleTempsHommeChange(item.id, 'jourj', e.target.value)}
                                                            className="w-full text-right px-2 py-1.5 border border-blue-200 bg-blue-50/30 rounded focus:ring-1 focus:ring-kpmg-blue focus:bg-white font-semibold text-slate-700 outline-none"
                                                        />
                                                    </td>
                                                    <td className="py-3.5 px-4 text-right font-mono font-bold text-slate-700 bg-slate-50/30">{item.totalJours}</td>
                                                    <td className="py-3.5 px-4 text-right font-mono font-bold text-slate-900 bg-slate-50/30">{formatEur(item.totalEur)}</td>
                                                </tr>
                                            ))}
                                            {/* Majorations rows */}
                                            <tr className="bg-slate-50/20">
                                                <td colSpan="5" className="py-3 px-4 font-semibold text-slate-600">Majoration soirée de gala (+50% / 4 pax sur place)</td>
                                                <td className="py-2 px-2 text-right" colSpan="2">
                                                    <input 
                                                        type="number" 
                                                        value={majorationGala} 
                                                        onChange={(e) => setMajorationGala(parseFloat(e.target.value) || 0)}
                                                        className="w-36 text-right px-2 py-1.5 border border-blue-200 bg-blue-50/30 rounded focus:ring-1 focus:ring-kpmg-blue focus:bg-white font-semibold text-slate-700 outline-none ml-auto block"
                                                    />
                                                </td>
                                            </tr>
                                            <tr className="bg-slate-50/20">
                                                <td colSpan="5" className="py-3 px-4 font-semibold text-slate-600">Majoration soirée tardive après minuit (+100% / 2 pax)</td>
                                                <td className="py-2 px-2 text-right" colSpan="2">
                                                    <input 
                                                        type="number" 
                                                        value={majorationTardive} 
                                                        onChange={(e) => setMajorationTardive(parseFloat(e.target.value) || 0)}
                                                        className="w-36 text-right px-2 py-1.5 border border-blue-200 bg-blue-50/30 rounded focus:ring-1 focus:ring-kpmg-blue focus:bg-white font-semibold text-slate-700 outline-none ml-auto block"
                                                    />
                                                </td>
                                            </tr>
                                            {/* Subtotal row */}
                                            <tr className="bg-kpmg-dark text-white font-bold text-xs">
                                                <td colSpan="3" className="py-4 px-4">Sous-total temps homme</td>
                                                <td className="py-4 px-4 text-right font-mono">{totalPreprodDays}</td>
                                                <td className="py-4 px-4 text-right font-mono">{totalJourJDays}</td>
                                                <td className="py-4 px-4 text-right font-mono">{totalDays}</td>
                                                <td className="py-4 px-4 text-right font-mono">{formatEur(subtotalTempsHomme)}</td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>

                            {/* 2. PRESTATIONS EVENT TABLE */}
                            <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                <div className="bg-kpmg-slate px-6 py-4 border-b border-slate-200 flex justify-between items-center">
                                    <h3 className="font-bold text-kpmg-dark font-heading flex items-center gap-2">
                                        <span className="bg-kpmg-light text-white text-[10px] uppercase font-bold px-2 py-0.5 rounded">2</span>
                                        2. PRESTATIONS ÉVÉNEMENT (refacturées au réel - marge 0%)
                                    </h3>
                                    <span className="text-xs text-slate-500 font-mono">Sous-total : {formatEur(subtotalPrestationsNet)}</span>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-xs text-left border-collapse">
                                        <thead>
                                            <tr className="bg-slate-50 text-slate-500 border-b border-slate-200">
                                                <th className="py-3 px-4 font-semibold">Poste</th>
                                                <th className="py-3 px-4 font-semibold text-right w-36">Montant brut fournisseur</th>
                                                <th className="py-3 px-4 font-semibold text-right w-36">Savings négocié (EUR)</th>
                                                <th className="py-3 px-4 font-semibold text-right w-36">Montant net refacturé</th>
                                                <th className="py-3 px-4 font-semibold text-left w-48">Détails / Quantité</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {calculatedPrestations.map((item) => (
                                                <tr key={item.id} className="hover:bg-slate-50/50">
                                                    <td className="py-3.5 px-4 font-medium text-slate-800">{item.poste}</td>
                                                    <td className="py-2 px-2 text-right font-mono">
                                                        {!item.isRefund ? (
                                                            <input 
                                                                type="number" 
                                                                value={item.brut} 
                                                                onChange={(e) => handlePrestationChange(item.id, 'brut', e.target.value)}
                                                                className="w-full text-right px-2 py-1.5 border border-blue-200 bg-blue-50/30 rounded focus:ring-1 focus:ring-kpmg-blue focus:bg-white font-semibold text-slate-700 outline-none"
                                                            />
                                                        ) : (
                                                            <span className="text-slate-400 font-normal italic pr-2">Sans objet</span>
                                                        )}
                                                    </td>
                                                    <td className="py-2 px-2 text-right font-mono">
                                                        <input 
                                                            type="number" 
                                                            value={item.savings} 
                                                            onChange={(e) => handlePrestationChange(item.id, 'savings', e.target.value)}
                                                            className="w-full text-right px-2 py-1.5 border border-blue-200 bg-blue-50/30 rounded focus:ring-1 focus:ring-kpmg-blue focus:bg-white font-semibold text-slate-700 outline-none"
                                                        />
                                                    </td>
                                                    <td className={`py-3.5 px-4 text-right font-mono font-bold bg-slate-50/30 ${item.net < 0 ? 'text-red-600' : 'text-slate-900'}`}>
                                                        {formatEur(item.net)}
                                                    </td>
                                                    <td className="py-3.5 px-4 text-slate-500 font-medium">{item.note}</td>
                                                </tr>
                                            ))}
                                            {/* Subtotal row */}
                                            <tr className="bg-kpmg-medium text-white font-bold text-xs">
                                                <td className="py-4 px-4">Sous-total prestations</td>
                                                <td className="py-4 px-4 text-right font-mono">{formatEur(totalBrutPrestations)}</td>
                                                <td className="py-4 px-4 text-right font-mono">{formatEur(totalSavingsPrestations)}</td>
                                                <td className="py-4 px-4 text-right font-mono">{formatEur(subtotalPrestationsNet)}</td>
                                                <td className="py-4 px-4"></td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>

                            {/* 3. SYNTHESE & FACTURATION */}
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                                <div className="lg:col-span-7 bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                                    <div className="bg-kpmg-slate px-6 py-4 border-b border-slate-200">
                                        <h3 className="font-bold text-kpmg-dark font-heading flex items-center gap-2">
                                            <span className="bg-amber-500 text-white text-[10px] uppercase font-bold px-2 py-0.5 rounded">3</span>
                                            3. SYNTHÈSE DE RÉMUNÉRATION & FACTURATION
                                        </h3>
                                    </div>
                                    <div className="p-6">
                                        <table className="w-full text-xs text-left border-collapse">
                                            <thead>
                                                <tr className="border-b border-slate-100 text-slate-400">
                                                    <th className="py-2.5 font-semibold">Poste</th>
                                                    <th className="py-2.5 text-center font-semibold w-32">Base / Taux</th>
                                                    <th className="py-2.5 text-right font-semibold w-32">Montant (EUR)</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100">
                                                <tr>
                                                    <td className="py-3 font-medium text-slate-800">Prestations refacturées (net, marge 0%)</td>
                                                    <td className="py-3 text-center text-slate-500">Au réel</td>
                                                    <td className="py-3 text-right font-mono font-bold text-slate-900">{formatEur(basePrestationsRefacturees)}</td>
                                                </tr>
                                                <tr>
                                                    <td className="py-3 font-medium text-slate-800">Honoraires agence</td>
                                                    <td className="py-3 text-center text-slate-500">6% (event &gt; 100K)</td>
                                                    <td className="py-3 text-right font-mono font-bold text-slate-900">{formatEur(honorairesAgence)}</td>
                                                </tr>
                                                <tr>
                                                    <td className="py-3 font-medium text-slate-800">Assurance</td>
                                                    <td className="py-3 text-center text-slate-500">0,8%</td>
                                                    <td className="py-3 text-right font-mono font-bold text-slate-900">{formatEur(assurance)}</td>
                                                </tr>
                                                <tr>
                                                    <td className="py-3 font-medium text-slate-800">Frais de portage</td>
                                                    <td className="py-3 text-center text-slate-500">4% (0% si carte logée)</td>
                                                    <td className="py-3 text-right font-mono font-bold text-slate-900">{formatEur(fraisPortage)}</td>
                                                </tr>
                                                <tr className="bg-slate-50 font-bold">
                                                    <td className="py-3 px-2 font-bold text-kpmg-dark">TOTAL HT</td>
                                                    <td className="py-3 text-center"></td>
                                                    <td className="py-3 px-2 text-right font-mono text-kpmg-dark text-sm">{formatEur(totalHT)}</td>
                                                </tr>
                                                <tr>
                                                    <td className="py-3 font-medium text-slate-500">TVA 20%</td>
                                                    <td className="py-3 text-center">20%</td>
                                                    <td className="py-3 text-right font-mono font-bold text-slate-700">{formatEur(tva)}</td>
                                                </tr>
                                                <tr className="bg-kpmg-dark text-white font-extrabold">
                                                    <td className="py-3 px-4 uppercase rounded-l-lg">TOTAL TTC</td>
                                                    <td className="py-3 text-center"></td>
                                                    <td className="py-3 px-4 text-right font-mono text-base rounded-r-lg">{formatEur(totalTTC)}</td>
                                                </tr>
                                            </tbody>
                                        </table>
                                    </div>
                                </div>

                                {/* 4. ECHEANCIER & CONDITIONS */}
                                <div className="lg:col-span-5 bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col justify-between">
                                    <div>
                                        <div className="bg-kpmg-slate px-6 py-4 border-b border-slate-200">
                                            <h3 className="font-bold text-kpmg-dark font-heading flex items-center gap-2">
                                                <span className="bg-slate-600 text-white text-[10px] uppercase font-bold px-2 py-0.5 rounded">4</span>
                                                4. ECHEANCIER & CONDITIONS
                                            </h3>
                                        </div>
                                        <div className="p-6 space-y-4">
                                            <div className="border border-slate-100 rounded-xl p-4 flex justify-between items-center bg-slate-50/50">
                                                <div>
                                                    <h4 className="font-bold text-slate-800 text-xs">Acompte à la commande</h4>
                                                    <p className="text-[10px] text-slate-500 mt-1">30% à la commande (plafond légal)</p>
                                                </div>
                                                <span className="font-mono font-bold text-slate-900 text-sm">{formatEur(acompte)}</span>
                                            </div>

                                            <div className="border border-slate-100 rounded-xl p-4 flex justify-between items-center bg-slate-50/50">
                                                <div>
                                                    <h4 className="font-bold text-slate-800 text-xs">Solde (facture unique)</h4>
                                                    <p className="text-[10px] text-slate-500 mt-1">Solde à 45 jours fin de mois</p>
                                                </div>
                                                <span className="font-mono font-bold text-slate-900 text-sm">{formatEur(solde)}</span>
                                            </div>

                                            <div className="border border-emerald-100 rounded-xl p-4 flex justify-between items-center bg-emerald-50/20">
                                                <div>
                                                    <h4 className="font-bold text-emerald-800 text-xs">Savings pour KPMG</h4>
                                                    <p className="text-[10px] text-emerald-600 mt-1">Remises & gratuités négociées</p>
                                                </div>
                                                <span className="font-mono font-bold text-emerald-800 text-sm">{formatEur(totalSavingsPrestations)}</span>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="bg-slate-50 px-6 py-4 border-t border-slate-100 text-[10px] text-slate-400 leading-relaxed italic">
                                        Remises négociées, reversées à 100% (obligation de moyens de -10% à -20%).
                                    </div>
                                </div>
                            </div>
                        </section>

                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
